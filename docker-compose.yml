services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: job-tracker-app
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: job_tracker
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    networks:
      - job-tracker

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: job-tracker-scheduler
    entrypoint: ["/scheduler-entrypoint.sh"]
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: job_tracker
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    networks:
      - job-tracker
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: job-tracker-queue
    entrypoint: ["/queue-entrypoint.sh"]
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: job_tracker
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    networks:
      - job-tracker
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: job-tracker-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    environment:
      AUTH_LOGIN: ${AUTH_LOGIN}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
    networks:
      - job-tracker
    restart: on-failure

  db:
    image: mysql:8.0
    container_name: job-tracker-db
    environment:
      MYSQL_DATABASE: job_tracker
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ularavel", "-plaravel"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - job-tracker
    restart: unless-stopped

  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    container_name: job-tracker-backup
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: job_tracker
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - ./backups:/backups
    depends_on:
      - db
    networks:
      - job-tracker
    restart: unless-stopped

networks:
  job-tracker:
    driver: bridge

volumes:
  db-data:
